<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ponto App — Em breve</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #065f46 0%, #0f766e 60%, #0d9488 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      color: #fff; text-align: center; padding: 24px;
    }
    .box { max-width: 420px; }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 26px; font-weight: 800; margin-bottom: 10px; }
    p { font-size: 15px; color: rgba(255,255,255,.8); line-height: 1.7; margin-bottom: 28px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #fff; color: #065f46;
      border: none; border-radius: 10px; padding: 12px 24px;
      font-size: 14px; font-weight: 700; text-decoration: none; cursor: pointer;
      transition: opacity .18s;
    }
    .btn:hover { opacity: .9; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">📱</div>
    <h1>App Mobile — Em breve</h1>
    <p>O aplicativo nativo para Android e iOS do Ponto está em desenvolvimento.<br>
       Por enquanto, colaboradores e gestores podem utilizar o sistema normalmente pelo navegador do celular.</p>
    <a href="/system/" class="btn">⏱ Acessar pelo navegador</a>
  </div>
</body>
</html>
